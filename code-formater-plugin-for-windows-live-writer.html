      <h1>Code formater Plugin for Windows Live Writer</h1>
      <div class="my-1"></div>
      <div class="text-center text-text-subtle text-sm">Aug 26, 2006</div>
      
        <p>I use <a href="http://windowslivewriter.spaces.live.com/">Windows Live Writer</a> for writing and posting to my blog. However I’ve always had problems with code formating. Until now!</p>

<p><a href="http://http://www.codeplex.com/Wiki/View.aspx?ProjectName=WlwCodeFormatter">This little plug in</a> to Live Writer does the job!</p>

<p>Thanks to Steve Dunn whos excellt blog you’ll find <a href="http://stevedunns.blogspot.com/">here</a></p>
